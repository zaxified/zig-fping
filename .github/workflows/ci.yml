name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Instrumented fuzzing is run on demand (see the `fuzz` job): no corpus is
  # persisted between CI runs, so a schedule would only re-explore the same
  # shallow space over unchanged code. Trigger it after touching a parser.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Reference binary for the golden-diff suite (test/golden.sh);
      # ubuntu-latest ships fping 5.1.
      - name: Install reference fping
        run: sudo apt-get update && sudo apt-get install -y fping

      # Same entry point as local development: scripts/test.sh runs
      # fmt --check, build, unit tests, the namespaced functional suite
      # and the golden-diff comparison against the reference fping.
      - name: Test pipeline
        run: sh scripts/test.sh

      # Cross-compile every other supported target in the same job so they all
      # share one coherent Zig cache, instead of a matrix that fought over a
      # single cache key (one target hit, the rest missed). Zig cross-compiles
      # out of the box — no sysroots or toolchains. Runs even if the test step
      # failed, so a broken cross-compile still surfaces in the same run.
      - name: Cross-compile
        if: ${{ !cancelled() }}
        run: |
          for t in aarch64-linux riscv64-linux x86_64-linux-musl; do
            echo "==> $t"
            zig build -Dtarget="$t" -Doptimize=ReleaseSafe
          done

  # Instrumented fuzzing runs only on manual dispatch: scripts/fuzz.sh forces
  # the LLVM backend (--release=safe) to dodge ziglang/zig#30655.
  fuzz:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Fuzz (10 min)
        run: sh scripts/fuzz.sh 600
