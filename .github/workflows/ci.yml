name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Reference binary for the golden-diff suite (test/golden.sh);
      # ubuntu-latest ships fping 5.1.
      - name: Install reference fping
        run: sudo apt-get update && sudo apt-get install -y fping

      # Same entry point as local development: scripts/test.sh runs
      # fmt --check, build, unit tests, the namespaced functional suite
      # and the golden-diff comparison against the reference fping.
      - name: Test pipeline
        run: sh scripts/test.sh

  # Zig cross-compiles to any Linux target out of the box — no
  # cross-toolchains, sysroots or autotools triplets needed.
  cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [aarch64-linux, riscv64-linux, x86_64-linux-musl]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Cross-compile (${{ matrix.target }})
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
